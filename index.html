// Determine color values from risk level
const isHigh = score >= 8;
const isMod  = score >= 4 && score < 8;
const riskHex   = isHigh ? "#c0392b" : isMod ? "#d35400" : "#27ae60";
const riskBgHex = isHigh ? "#fdf3f2" : isMod ? "#fef9f3" : "#f0faf5";
const riskBorder= isHigh ? "#e74c3c" : isMod ? "#e67e22" : "#2ecc71";
const riskBadge = isHigh ? "#e74c3c" : isMod ? "#f39c12" : "#27ae60";
const riskLabel = isHigh ? "⚠ HIGH RISK" : isMod ? "⚡ MODERATE RISK" : "✓ LOW RISK";
const dateStr   = new Date().toLocaleDateString("en-US", { weekday:"long", year:"numeric", month:"long", day:"numeric" });
const timeStr   = new Date().toLocaleTimeString("en-US", { hour:"2-digit", minute:"2-digit" });

// Build Q&A rows
const qaRows = (questions || []).map((q, i) => {
const ans = answers && answers[q.id];
const rowBg = ans ? "#fff8f8" : "#fff";
const ansText = ans ? `<span style="color:#c0392b;font-weight:700;">YES &nbsp;+${q.pts} pt${q.pts>1?"s":""}</span>` : `<span style="color:#27ae60;font-weight:700;">NO</span>`;
return `<tr style="background:${rowBg};">
<td style="padding:5px 8px;width:22px;color:#718096;font-size:8.5pt;border-bottom:1px solid #edf2f7;">${i+1}.</td>

}).join("");

function printPlannerShiftLog(tasks, mood, appetite, sleep, notes) {
const pw = window.open('','_blank','width=900,height=700');
const dateStr = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
const timeStr = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
const formId  = 'CVR-' + Math.random().toString(36).substr(2,8).toUpperCase();

// Group tasks by category
const cats = {};
tasks.forEach(t => { if(!cats[t.cat]) cats[t.cat]=[]; cats[t.cat].push(t); });
const total = tasks.length, done = tasks.filter(t=>t.done).length;
const pct = total > 0 ? Math.round(done/total*100) : 0;
const circ = 2*Math.PI*26, offset = circ - (circ*pct/100);

const catIcons = {
  'Hygiene':'🚿','Meals & Nutrition':'🍽️','Medical & Vitals':'🩺',
  'Physical & Social':'🏃','Cognitive & Social':'🧠','Safety & Environment':'🛡️',
  'Mobility & Physical':'💪'
};

const taskRows = Object.entries(cats).map(([cat, catTasks]) => {
  const rows = catTasks.map(t => `
    <tr style="background:${t.done?'#edf7f2':'#fff'};">
      <td style="padding:5px 8px;font-size:10pt;border-bottom:1px solid #e8f0ee;text-align:center;">${t.done?'<span style="color:#1a6b45;font-weight:700;">✓</span>':'<span style="color:#ccc;">○</span>'}</td>
      <td style="padding:5px 8px;font-size:9pt;border-bottom:1px solid #e8f0ee;font-weight:500;color:${t.done?'#5a7a70':'#2c3a4a'};${t.done?'text-decoration:line-through;':''}">${t.text}</td>
      <td style="padding:5px 8px;font-size:8pt;border-bottom:1px solid #e8f0ee;text-align:center;color:#999;">___:___</td>
      <td style="padding:5px 8px;font-size:8pt;border-bottom:1px solid #e8f0ee;text-align:center;color:#999;">______</td>
      <td style="padding:5px 8px;font-size:7.5pt;border-bottom:1px solid #e8f0ee;text-align:center;">
        <span style="background:${t.done?'#edf7f2':'#f0f0f0'};color:${t.done?'#1a6b45':'#888'};padding:1px 6px;border-radius:3px;font-weight:700;">${t.done?'✓ Done':'Pending'}</span>
      </td>
    </tr>`).join('');
  const catDone = catTasks.filter(t=>t.done).length;
  return `
    <tr><td colspan="5" style="padding:5px 8px;background:#0e2433;color:#fff;">
      <span style="font-size:8pt;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;">
        ${catIcons[cat]||'📌'} ${cat}
        <span style="float:right;opacity:0.6;font-weight:500;">${catDone}/${catTasks.length}</span>
      </span>
    </td></tr>${rows}`;
}).join('');

const moodBg   = {happy:'#edf7f2',calm:'#e6f4f3',tired:'#fdf6e3',anxious:'#fdf0f0'}[mood?.split(' ')[0]?.toLowerCase()]||'#f8f8f8';

metaDesc: "Build a clear 7-day senior care schedule. Assign caregiver shifts, appointment slots, therapy sessions, and social activities across the full week.",
h1: "Weekly Senior Care Schedule Planner",
intro: "Managing eldercare is a week-long undertaking, not just a day-by-day struggle. A well-structured weekly care schedule is the backbone of any organized caregiving system, ensuring that doctor appointments never conflict with therapy sessions, that overnight shifts are evenly distributed among family members, and that the elder social and recreational needs are woven into their medical routine. The Carevera Weekly Care Schedule Planner gives you a dynamic, 7-day visual grid where you can map out caregiver assignments, recurring medical routines, therapy appointments, and social activities all in a single, printable calendar view. Research from the National Alliance for Caregiving consistently shows that caregivers who use formal weekly scheduling tools report significantly lower levels of overwhelm, better family coordination, and fewer emergency care gaps. The planner supports multiple caregiver entries, meaning you can assign specific time slots to a daughter who handles weekday mornings, a professional aide who covers afternoons, and a son who manages weekend evenings.",
howItWorks: ["Enter caregiver names and define their weekly availability windows.","Assign recurring tasks (medication, bathing, therapy) to specific time slots.","Add appointment and activity blocks for doctor visits, PT, or social events.","Print the completed 7-day grid as a wall-ready care schedule."],
benefits: ["Prevent Coverage Gaps: Visually map who is responsible at every hour, eliminating dangerous periods where no caregiver is assigned.","Coordinate Multiple Caregivers: Assign shifts to family members, professional aides, and volunteers in one unified view.","Reduce Family Conflict: A shared printed schedule eliminates confusion and disagreements about who is supposed to be there."],
faqs: [
{q:"How far in advance should I plan the care schedule?",a:"Plan at minimum one week at a time. For stability, create a recurring two-week template and adjust it only when appointments or caregiver availability changes."},
{q:"What should I do if a caregiver calls in sick?",a:"Use the schedule as a backup reference showing you who else is available nearby that day. Always designate one backup caregiver per day when possible."},
{q:"Can I include non-medical activities like church visits or haircuts?",a:"Yes, and we encourage it. Social and recreational activities are clinically important for emotional and cognitive health. They belong in the care schedule alongside medical appointments."},
{q:"How do I share the schedule with remote family members?",a:"Print and photograph the completed schedule, or take a screenshot of the on-screen grid and send it via email or a family group chat."}
],
ctaTitle: "Review the Schedule Every Sunday",
ctaBody: "Hold a 15-minute family check-in every Sunday to confirm the upcoming week assignments, flag any conflicts, and update the printed schedule before the week begins.",
componentName: "WeeklyCareSchedulePlanner"
},

"senior-morning-routine-builder": {
slug: "senior-morning-routine-builder", hubSlug: "caregiver-planning",
title: "Senior Morning Routine Builder",
seoTitle: "Senior Morning Routine Builder | Daily Care Routine Planner | Carevera",
metaDesc: "Create a structured, time-stamped morning care routine for seniors. Covers wake-up, hygiene, medication, breakfast, and safety checks.",
h1: "Senior Morning Routine Builder",
intro: "For seniors, especially those with dementia, Parkinson disease, or mobility limitations, a consistent, predictable morning routine is not simply a matter of comfort. It is a clinical necessity. Geriatric research consistently shows that structured morning routines reduce anxiety and agitation in older adults with cognitive impairment, lower the risk of falls by ensuring balance and hydration are addressed before independent mobility begins, and significantly reduce caregiver stress by eliminating the daily decision fatigue of figuring out what comes next. The Carevera Senior Morning Routine Builder walks you through the construction of a complete, time-stamped morning care sequence, from the moment the elder wakes up to the point they are settled for their first meaningful activity of the day. The builder prompts you to consider every critical morning variable including safe wake-up positioning, oral hygiene, continence care, dressing assistance, morning medications, breakfast nutrition, and post-breakfast safety checks.",
howItWorks: ["Select the senior primary care needs and mobility status.","Choose from our library of morning care steps or add custom ones.","Assign approximate time targets to each step.","Generate a time-stamped, printable morning routine guide."],
benefits: ["Reduces Morning Agitation: Predictable routines measurably reduce resistance and confusion in seniors with Alzheimer or other dementias.","Prevents Morning Falls: Structuring sit-to-stand sequences and balance checks into the routine addresses the high-risk period immediately after waking.","Empowers Substitute Caregivers: Any replacement aide or family member can follow the laminated routine without needing lengthy verbal instructions."],
faqs: [
{q:"How long should a senior morning routine realistically take?",a:"For a senior requiring moderate assistance, plan for 60 to 90 minutes from wake-up to post-breakfast settled. Rushing any step, especially transfers, dressing, or medication, significantly increases fall and error risk."},
{q:"What if the senior refuses part of their morning routine?",a:"Never force compliance. Allow a 5-10 minute break and try again. For consistent refusal, consult their physician or an occupational therapist, as refusal can signal pain, depression, or medication side effects."},
{q:"Should I include oral care even if they have full dentures?",a:"Yes. Oral hygiene for denture wearers includes brushing the gums, tongue, and palate with a soft brush, as well as cleaning and soaking the dentures. Poor oral hygiene is a significant infection risk in elderly patients."},
{q:"Can I adapt the routine for someone who wakes at irregular times?",a:"Absolutely. Instead of fixed clock times, use relative time labels like Step 1 Upon waking and Step 2 Ten minutes after waking, so the routine remains consistent regardless of wake time."}
],
ctaTitle: "Laminate Your Morning Routine Card",
ctaBody: "Print and laminate the completed routine guide and place one copy on the bedside table, one inside the bathroom door, and one on the kitchen cabinet.",
componentName: "SeniorMorningRoutineBuilder"
},

"medication-reminder-schedule-maker": {
slug: "medication-reminder-schedule-maker", hubSlug: "medication-management",
title: "Medication Reminder Schedule Maker",
seoTitle: "Medication Reminder Schedule Maker | Senior Pill Reminder Chart | Carevera",
metaDesc: "Create a personalized medication reminder schedule with specific times, food requirements, and caregiver alert flags. Print and post for daily use.",
h1: "Medication Reminder Schedule Maker",
intro: "Medication non-adherence is one of the most dangerous and preventable threats to senior health. According to the National Institute on Aging, approximately 55% of elderly patients do not take their medications as prescribed, contributing to an estimated 125,000 preventable deaths annually in the United States. The Carevera Medication Reminder Schedule Maker creates a fully structured, time-blocked reminder chart that tells caregivers not just what medication to give, but exactly when, with what food or liquid requirements, at what dose, and which observable side effects to watch for afterward. The tool supports up to 20 individual medications and organizes them across up to six daily time windows. For each medication, you can flag special instructions and attach caregiver alert flags that draw immediate attention to critical drugs like blood thinners, insulin, and cardiac medications.",
howItWorks: ["Enter each medication with its dose, frequency, and specific time windows.","Add food and liquid requirements and post-dose monitoring instructions.","Flag critical medications with colored alert markers.","Generate and print a large-print reminder chart optimized for wall display."],
benefits: ["Reduces Medication Omissions: A visible, structured reminder chart has been shown to reduce missed doses far more effectively than verbal reminders alone.","Alerts to High-Risk Drugs: Color-coded flags draw attention to medications requiring special caution, such as anticoagulants or hypoglycemics.","Large-Print Format: Output is formatted in large, readable font accessible to both elderly eyes and any caregiver entering the home."],
faqs: [
{q:"Is this the same as the Medication Schedule Generator?",a:"They are complementary tools. The Schedule Generator manages your full medication list and prints a clinical schedule matrix. This Reminder Maker focuses on creating a wall-postable, visual reminder chart with alert flags and food instructions."},
{q:"What is the caregiver alert flag used for?",a:"Alert flags mark medications where errors are especially dangerous, for example a double dose of warfarin or missed insulin can have life-threatening consequences. The flag ensures these drugs get extra visual attention on the chart."},
{q:"Should the elder be able to see and understand their own reminder chart?",a:"Wherever possible, yes. Involving seniors in their own medication awareness improves adherence and dignity. Use large print and simple language on the chart."},
{q:"How often should I update the reminder schedule?",a:"Update it immediately whenever a new medication is added, a dose is changed, or a medication is discontinued. An outdated reminder chart is more dangerous than no chart at all."}
],
ctaTitle: "Post the Chart at Eye Level",
ctaBody: "Mount the printed reminder chart at eye level on the medication cabinet or refrigerator. Pair it with a weekly pill organizer for maximum error prevention.",
componentName: "MedicationReminderScheduleMaker"
},

"doctor-appointment-organizer": {
slug: "doctor-appointment-organizer", hubSlug: "caregiver-planning",
title: "Doctor Appointment Organizer",
seoTitle: "Senior Doctor Appointment Organizer | Caregiver Visit Prep Tool | Carevera",
metaDesc: "Prepare for every senior doctor visit. Track upcoming appointments, generate pre-visit question lists, log post-visit instructions, and print a visit summary.",
h1: "Senior Doctor Appointment Organizer",
intro: "A doctor appointment is one of the most valuable and most easily wasted opportunities in a senior healthcare journey. The average primary care visit lasts just 18 minutes, yet may need to address a dozen active medical concerns, several new symptoms, and a complex medication list across multiple specialists. Without structured preparation, critical issues get forgotten in the waiting room, key questions never get asked, and post-visit instructions are lost on the drive home. The Carevera Doctor Appointment Organizer helps family caregivers arrive at every medical appointment prepared, organized, and able to advocate effectively for their loved one. The tool has three core modules covering pre-visit preparation, visit tracking, and post-visit action items that convert into a clear follow-up action list covering prescription pickups, lab draws, specialist referrals, and home care adjustments.",
howItWorks: ["Log the upcoming appointment details and physician specialty.","Build a prioritized pre-visit question list and symptom log.","Capture doctor responses and instructions during the visit.","Generate a printable post-visit action summary to file and share."],
benefits: ["Maximize Every Appointment: Arrive with a prioritized question list so the most important concerns are addressed in the limited time available.","Never Lose Post-Visit Instructions: Capture medication changes, referrals, and follow-up orders in real time so nothing is forgotten.","Coordinate Multi-Specialist Care: Use the visit summaries to create a clear health timeline you can share with all treating physicians."],
faqs: [
{q:"What questions should I always bring to a senior doctor visit?",a:"Always address any new or worsening symptoms, medication side effects, fall risk, upcoming lab results, vaccination status, and cognitive or mood changes. Use our pre-built question library as a starting point."},
{q:"Can I use this tool for specialist appointments?",a:"Absolutely. The organizer has a specialty field that adjusts the pre-built question suggestions to match the type of appointment. Each specialist visit gets its own separate entry."},
{q:"What should I do if the doctor gives verbal-only instructions?",a:"Ask them to repeat each instruction clearly and record it immediately using this tool. Never rely on memory alone in a medical setting. You have every right to ask a doctor to slow down and clarify."},
{q:"Should I share the appointment summary with other caregivers?",a:"Yes. Every caregiver involved in the elder care should receive a copy of the post-visit summary. This is especially important when medications or routines have been changed."}
],
ctaTitle: "Bring a Second Set of Ears",
ctaBody: "Whenever possible, bring a second family member or trusted friend to medical appointments. Two people capture more detail, remember more, and can advocate more confidently than one.",
componentName: "DoctorAppointmentOrganizer"
},

"care-tasks-priority-planner": {
slug: "care-tasks-priority-planner", hubSlug: "caregiver-planning",
title: "Care Tasks Priority Planner",
seoTitle: "Care Tasks Priority Planner | Senior Caregiving Task Manager | Carevera",
metaDesc: "Prioritize your caregiving tasks by urgency and importance. Prevent overwhelm, delegate effectively, and ensure critical care duties are never delayed.",
h1: "Care Tasks Priority Planner",
intro: "When you are a family caregiver, everything feels urgent, and that feeling of constant, undifferentiated urgency is one of the primary drivers of caregiver burnout. The Carevera Care Tasks Priority Planner applies a structured prioritization framework adapted from clinical healthcare task management principles to help you categorize, rank, and delegate your caregiving workload. Tasks are organized across four priority tiers: Tier 1 Critical covers tasks with immediate health or safety consequences if delayed. Tier 2 Important covers recurring tasks that prevent downstream complications. Tier 3 Delegatable covers tasks that can safely be handled by other family members, neighbors, or volunteers. Tier 4 Deferrable covers tasks that improve quality of life but can be scheduled around critical care. By visualizing your full task load through this lens, you will immediately see which items are consuming your time disproportionately and which can be delegated.",
howItWorks: ["Enter all active caregiving tasks, chores, and responsibilities.","Rate each task by urgency (time-sensitive) and importance (health impact).","The planner automatically assigns each task to one of four priority tiers.","Generate a prioritized action list and identify tasks safe to delegate."],
benefits: ["Stop Task Overwhelm: Visualizing the full task load with clear priority levels reduces the anxiety of feeling like everything is equally urgent.","Delegate Confidently: The planner flags which tasks can safely be handled by others, giving you a clear brief for asking family or volunteers for help.","Protect Critical Care Time: By deprioritizing non-essential tasks, you protect your energy and attention for the tasks that directly affect your elder safety and health."],
faqs: [
{q:"What makes a caregiving task critical versus important?",a:"A critical task has immediate safety consequences if skipped, such as missing a cardiac medication or a fall response. An important task has significant health consequences if repeatedly neglected but is not immediately dangerous if delayed by a few hours."},
{q:"How do I convince family members to take on Tier 3 tasks?",a:"Share the printed priority plan at a family meeting. When siblings see a concrete list of tasks and understand which ones only you can handle, the conversation about shared responsibility becomes far less emotional."},
{q:"How often should I update the priority plan?",a:"Review and update it weekly at minimum. The priority landscape shifts as the elder health changes, new appointments arise, and seasonal responsibilities change."},
{q:"Can I use this tool if I am the only caregiver with no family support?",a:"Yes. For solo caregivers, the priority planner is even more critical. It helps you identify which tasks can be handled by community volunteers, adult day centers, Meals on Wheels, or paid aides."}
],
ctaTitle: "Hold a Monthly Family Task Review",
ctaBody: "Share the completed priority plan with all involved family members monthly. Redistribute delegatable tasks evenly to prevent primary caregiver burnout.",
componentName: "CareTasksPriorityPlanner"
},

"night-care-routine-planner": {
slug: "night-care-routine-planner", hubSlug: "caregiver-planning",
title: "Night Care Routine Planner",
seoTitle: "Senior Night Care Routine Planner | Nighttime Caregiving Checklist | Carevera",
metaDesc: "Build a structured nighttime care routine for seniors. Cover evening medications, bed preparation, safety checks, and caregiver handover protocols.",
h1: "Senior Night Care Routine Planner",
intro: "Nighttime is statistically the most dangerous period in a senior day. Falls occur most frequently during nighttime bathroom trips, often taken in darkness, in a state of sleep-related disorientation, and without the alertness that accompanies daytime movement. Nighttime is also when medication errors are most likely, when seniors with dementia experience the most pronounced sundowning symptoms, and when caregivers exhausted from the day are least vigilant. A structured, consistent nighttime care routine actively prevents the most common categories of nighttime elder care emergencies. The Carevera Night Care Routine Planner guides you through building a complete, step-by-step evening and bedtime care sequence. The routine begins with the pre-dinner wind-down phase and progresses through medication administration, personal hygiene, safe transfer to bed, nighttime safety configuration, and final comfort checks. A caregiver handover module generates a structured briefing form noting the elder mood, any incidents, and special overnight instructions.",
howItWorks: ["Select the senior evening and nighttime care needs.","Build a step-by-step routine from wind-down through bed safety checks.","Add handover notes for night aides or rotating family caregivers.","Print a laminate-ready nighttime routine guide with safety reminders."],
benefits: ["Reduces Nighttime Fall Risk: Structuring pathway lighting checks, bed rail confirmation, and safe transfer sequences directly addresses the primary causes of nighttime falls.","Supports Better Sleep: A consistent wind-down routine improves sleep quality for seniors with dementia, anxiety, or chronic pain, reducing nighttime wake episodes.","Streamlines Night Aide Handovers: The handover briefing module ensures overnight aides have complete situational awareness without requiring a lengthy verbal debrief."],
faqs: [
{q:"What is the single most important nighttime fall prevention step?",a:"Ensuring a clear, lit pathway from the bed to the bathroom is the single most evidence-backed nighttime fall prevention measure. Use automatic LED plug-in nightlights and remove all objects from the floor along this route."},
{q:"How do I handle nighttime bathroom trips for a senior who moves independently?",a:"Provide a bedside commode for seniors who make frequent nighttime bathroom trips. Eliminating the need to walk a long distance in the dark significantly reduces fall risk."},
{q:"What should the caregiver handover note include?",a:"At minimum the handover note should cover current pain level, mood and agitation status, any incidents during the day, tonight bedtime medications given, and any special overnight monitoring instructions from the doctor."},
{q:"Should I check on a sleeping senior during the night?",a:"For higher-risk seniors, a single quiet check-in between 1 and 3 AM is recommended. For lower-risk seniors, a motion-activated monitor can serve this purpose passively."}
],
ctaTitle: "Start the Wind-Down Two Hours Before Bed",
ctaBody: "Dim lights, reduce screen time, and stop stimulating activities two hours before the target bedtime. For seniors with dementia, this pre-sleep transition period is essential for reducing sundowning symptoms.",
componentName: "NightCareRoutinePlanner"
},

"medication-refill-tracker": {
slug: "medication-refill-tracker", hubSlug: "medication-management",
title: "Medication Refill Tracker",
seoTitle: "Senior Medication Refill Tracker | Prescription Refill Organizer | Carevera",
metaDesc: "Track upcoming prescription refills for seniors. Get alerts when medications are running low and generate a pharmacist-ready refill request list.",
h1: "Senior Medication Refill Tracker",
intro: "Running out of a critical medication is a medical emergency that should never happen, yet for family caregivers managing multiple concurrent prescriptions across multiple pharmacies and insurance formularies, refill gaps are alarmingly common. The Carevera Medication Refill Tracker is a proactive prescription management tool designed to ensure you never experience an unexpected medication shortage. For each medication, you log the current pill count, the daily dose, and the prescription refill frequency, and the tracker calculates a running days-of-supply countdown for every drug in the regimen. When a medication falls below your configured alert threshold, it appears in the Refill Needed section with a pharmacist-ready refill entry that you can print or photograph to bring to the pharmacy. The tool also tracks the pharmacy name, prescribing physician, and insurance plan for each drug, along with a refill calendar view providing a month-ahead snapshot of all expected refill dates.",
howItWorks: ["Enter each medication with current pill count, daily dose, and refill schedule.","Set your preferred refill alert threshold of 7, 14, or 21 days.","Monitor the dashboard for medications approaching the refill window.","Generate a printable pharmacist refill list for upcoming pickup."],
benefits: ["Prevent Dangerous Medication Gaps: Proactive tracking ensures no critical medication runs out before the next refill, eliminating emergency pharmacy runs.","Batch Pharmacy Trips: The refill calendar helps you group multiple prescription pickups into a single trip, saving time and transportation costs.","Mail-Order Ready: Extended advance alerts for seniors using mail-order pharmacy programs account for shipping lead times."],
faqs: [
{q:"What happens if a medication runs out before the insurance allows a refill?",a:"Contact the prescribing physician immediately. They can often provide a bridge prescription or authorize an emergency early refill. Pharmacists can also sometimes dispense a small emergency supply."},
{q:"How do I track medications filled at different pharmacies?",a:"Each medication entry includes a pharmacy field. Use this to note the specific pharmacy so your printable refill list can be sorted by pharmacy for efficient pickup routing."},
{q:"What should I do if a medication is no longer covered by insurance?",a:"First, ask the pharmacist for the generic equivalent. Then contact the prescribing physician who may be able to switch to a formulary-covered alternative. Also check manufacturer patient assistance programs."},
{q:"How do I handle controlled substances with strict refill rules?",a:"Controlled substances have legally mandated refill restrictions. Log their refill dates and contact the prescribing physician office at least 5-7 business days before the allowed refill date to allow for processing time."}
],
ctaTitle: "Set Refill Alerts 21 Days in Advance",
ctaBody: "For mail-order prescriptions, extend your refill alert to 21 days. For critical cardiac, seizure, or diabetes medications, never let supply drop below a 14-day buffer.",

},

<h2>The Challenge of Complex Medication Schedules</h2>
<p>As seniors develop multiple chronic conditions, their prescriptions multiply. Managing five, ten, or even fifteen distinct medications is not uncommon. This high volume leads to pill confusion, skipped doses, or severe drug interactions. Fortunately, proper planning and structured tools can minimize these risks.</p>

<h2>1. Use a High-Visibility Schedule Chart</h2>
<p>Memory alone is not enough to manage complex doses. Place a clear, high-contrast chart in a central location like the kitchen or bathroom cabinet. Our interactive <a href="#/tools/medication-schedule-generator">Medication Schedule Generator</a> allows you to compile, color-code, and print custom layouts instantly.</p>

<h2>2. Coordinate with a Single Pharmacy</h2>
<p>Filling prescriptions across different drugstores makes it difficult for pharmacists to crosscheck drug interactions. Try to consolidate all prescriptions into a single local pharmacy and build a close rapport with the primary pharmacist.</p>

<h2>3. Establish a Central Pill Sorting Routine</h2>
<p>Designate one day each week (e.g. Sunday afternoon) to audit and organize the upcoming week's pills. Use locked pill organizers with clear day-of-week chambers and distinct morning, afternoon, and night slots.</p>

<h2>4. Set Multiple Redundant Alarms</h2>
<p>Set alarms on the senior's phone, your personal smartphone, and consider placing smart speakers (like Google Nest or Amazon Echo) to announce: <i>"Time to take morning medications with water!"</i></p>

content: `
<h2>The Real Cost of Nursing Home Care in America (2026)</h2>
<p>Planning for long-term senior care is one of the most significant financial decisions an American family will ever face. The national median monthly cost of a private room in a skilled nursing facility has now reached <strong>approximately $9,500–$10,200</strong>, a figure that surprises — and overwhelms — most families when they first encounter it. Over a single year, that translates to between $114,000 and $122,400. Over three years of care, a common duration, the cumulative cost exceeds <strong>$340,000</strong>.</p>
<p>Understanding these costs early — ideally 5 to 10 years before care is needed — gives families the planning runway required to protect assets, explore insurance options, and make informed placement decisions. This guide breaks down everything American caregivers need to know.</p>

<h2>Types of Senior Care Facilities and What They Cost</h2>
<p>Not all senior care is the same, and cost differences between care types are dramatic. Here is a breakdown of the three primary options families encounter:</p>

<h2>1. Skilled Nursing Facilities (SNFs) — The Highest Cost Option</h2>
<p>A skilled nursing facility — often called a nursing home — provides 24-hour clinical supervision, nursing care, and rehabilitation services for seniors with complex medical needs. Costs vary enormously by state and facility quality.</p>
<ul style="padding-left:1.2rem; display:flex; flex-direction:column; gap:0.5rem; line-height:1.7;">
<li><strong>National median (semi-private room):</strong> approximately $8,100/month</li>
<li><strong>National median (private room):</strong> approximately $9,600/month</li>
<li><strong>Most expensive states:</strong> Alaska (~$29,000/mo), Connecticut (~$12,900/mo), Hawaii (~$13,500/mo), Massachusetts (~$12,800/mo)</li>
<li><strong>Most affordable states:</strong> Missouri (~$5,850/mo), Oklahoma (~$5,750/mo), Texas (~$5,800/mo), Louisiana (~$5,900/mo)</li>
</ul>
<p>These costs typically cover room, board, basic nursing care, and meals, but <em>exclude</em> personal items, therapy sessions beyond Medicare allowances, specialized medications, and amenity upgrades.</p>

<h2>2. Assisted Living Communities — The Middle Tier</h2>
<p>Assisted living is designed for seniors who need help with activities of daily living (ADLs) — bathing, dressing, medication management — but do not require intensive clinical nursing care around the clock. It is a fundamentally different level of care from a nursing home, and significantly less expensive.</p>
<ul style="padding-left:1.2rem; display:flex; flex-direction:column; gap:0.5rem; line-height:1.7;">
<li><strong>National median:</strong> approximately $4,500/month</li>
<li><strong>Most expensive states:</strong> Rhode Island (~$6,800/mo), Massachusetts (~$6,500/mo), New Jersey (~$6,400/mo)</li>
<li><strong>Most affordable states:</strong> Missouri (~$3,000/mo), South Dakota (~$3,350/mo), Kentucky (~$3,500/mo)</li>
</ul>
<p>It is critical to note that assisted living costs often do not include care add-ons such as memory care (Alzheimer's/dementia units), incontinence management, or two-person transfers. These extras can add $500–$2,500 per month to the base rate. Always request an itemized fee schedule before signing an admission agreement.</p>

<h2>3. In-Home Care — The Most Flexible Option</h2>
<p>Many families prefer to keep their loved one at home for as long as safely possible. Home health aides provide hands-on assistance with personal care, while homemaker/companion aides assist with household tasks. Costs are billed hourly.</p>
<ul style="padding-left:1.2rem; display:flex; flex-direction:column; gap:0.5rem; line-height:1.7;">
<li><strong>National median hourly rate (home health aide):</strong> approximately $30–$33/hour</li>
<li><strong>Part-time care (20 hours/week):</strong> approximately $2,500–$3,200/month</li>
<li><strong>Full-time care (40 hours/week):</strong> approximately $5,000–$6,400/month</li>
<li><strong>24/7 live-in care:</strong> can exceed $15,000/month in high-cost states</li>
</ul>
<p>Home care is often the most cost-effective choice when care needs are moderate. However, for seniors requiring frequent overnight monitoring, incontinence care, or two-person physical transfers, facility care may ultimately be more economical and safer.</p>
<p>Use our <a href="#/tools/nursing-home-cost-calculator" style="color:var(--color-primary); font-weight:700;">free Regional Cost Calculator</a> to compare all three care types by your specific state and duration of care.</p>

<h2>Who Pays for Nursing Home Care? A Guide to Funding Sources</h2>
<p>Understanding the patchwork of payment sources is essential. Families are frequently surprised to discover that standard health insurance — including Medicare — covers far less nursing home care than expected.</p>

<h2>Medicare Coverage — Short-Term Only</h2>
<p>Original Medicare (Part A) covers skilled nursing facility care <em>only following a qualifying hospital stay of at least 3 consecutive days</em>. Even then, coverage is strictly limited:</p>
<ul style="padding-left:1.2rem; display:flex; flex-direction:column; gap:0.5rem; line-height:1.7;">
<li><strong>Days 1–20:</strong> Medicare covers 100% of approved costs</li>
<li><strong>Days 21–100:</strong> Medicare covers costs above a daily coinsurance ($204 in 2026)</li>
<li><strong>Day 101 and beyond:</strong> Medicare pays nothing — the family bears the full cost</li>
</ul>
<p>This means Medicare is a rehabilitation benefit, not a long-term care benefit. Families planning primarily on Medicare for long-term nursing home care will be caught financially unprepared.</p>

<h2>Medicaid — The Primary Long-Term Payer</h2>
<p>Medicaid, not Medicare, pays for the majority of long-term nursing home care in the United States — currently covering over 60% of all nursing home residents. However, Medicaid is a means-tested program, requiring applicants to have limited assets (typically under $2,000 in countable assets for an individual) and limited income.</p>
<p>The path to Medicaid eligibility often requires careful advance planning, including awareness of the 5-year look-back period on asset transfers. Consulting a Certified Elder Law Attorney (CELA) at least 5 years before anticipated care needs is strongly recommended. Find one via the <a href="https://www.naela.org" target="_blank" rel="noopener" style="color:var(--color-primary); font-weight:700;">National Academy of Elder Law Attorneys</a>.</p>

<h2>Long-Term Care Insurance</h2>
<p>Long-term care insurance (LTCi) policies pay a daily or monthly benefit when the insured can no longer perform a specified number of ADLs. Premiums are significantly lower when purchased at younger ages (50s and early 60s) before health changes make qualification difficult or impossible. Hybrid life/LTCi policies have become increasingly popular as they build cash value if long-term care benefits are never used.</p>

<h2>Veterans Benefits (VA Aid & Attendance)</h2>
<p>Veterans who served during wartime periods may be eligible for the VA Aid & Attendance benefit, which can provide up to <strong>$2,300+/month</strong> for a veteran or $1,400+/month for a surviving spouse to help fund assisted living, nursing home, or in-home care. This benefit is significantly underutilized. Contact your State Veterans Affairs office or a VA-accredited claims agent for assistance applying.</p>

<h2>How to Choose the Right Facility: A Practical Checklist</h2>
<p>Not all nursing homes are created equal. CMS (the Centers for Medicare & Medicaid Services) rates nursing homes on a 5-star scale based on health inspections, staffing levels, and quality measures. When evaluating facilities, consider:</p>
<ul style="padding-left:1.2rem; display:flex; flex-direction:column; gap:0.5rem; line-height:1.7;">
<li><strong>CMS Star Rating:</strong> Aim for 4–5 stars. Search at <a href="https://www.medicare.gov/care-compare/" target="_blank" rel="noopener" style="color:var(--color-primary);">Medicare Care Compare</a>.</li>
<li><strong>Staffing ratios:</strong> Ask about RN hours per resident per day. The national minimum is inadequate for quality care; look for facilities that exceed it.</li>
<li><strong>Inspection history:</strong> Review the last three years of state inspection reports, which are public record.</li>
<li><strong>Discharge planning policies:</strong> Understand under what circumstances a resident may be asked to leave.</li>
<li><strong>Memory care capabilities:</strong> If dementia is a concern, evaluate whether the facility has a dedicated, secured memory care unit.</li>
<li><strong>Family council:</strong> Facilities with active family councils tend to have stronger accountability and communication.</li>
</ul>
<p>Use our <a href="#/tools/nursing-home-finder" style="color:var(--color-primary); font-weight:700;">Regional Nursing Home Finder</a> to filter highly-rated facilities in your state.</p>

<h2>The True Cost of Waiting</h2>
<p>One of the most costly mistakes families make is delaying the care planning conversation. The national average age at nursing home admission is 83, but meaningful financial and care planning must begin a decade earlier. Long-term care insurance premiums roughly double or triple between age 55 and 65. Asset protection strategies under Medicaid law require a minimum 5-year lead time. And the emotional cost of making major placement decisions during a crisis — after a fall, a stroke, or a dementia diagnosis — is immeasurable.</p>
<p>The best time to plan was ten years ago. The second-best time is today. Start with our <a href="#/tools/care-hours-calculator" style="color:var(--color-primary); font-weight:700;">Care Hours & Budget Modeler</a> to understand your current care load and begin projecting future needs.</p>

<h2>Frequently Asked Questions</h2>
<p><strong>Does Medicare cover 100% of nursing home costs?</strong> No. Medicare covers nursing home care only after a qualifying hospital stay, and only for up to 100 days (with a daily copay after Day 20). Long-term custodial care is not covered by Medicare.</p>
<p><strong>Can you keep your house and still qualify for Medicaid?</strong> In most states, your primary home is a non-countable asset for Medicaid eligibility purposes while you (or your spouse) live there. However, after death, states may seek estate recovery for benefits paid. An elder law attorney can advise on home protection strategies.</p>
<p><strong>What is the average length of stay in a nursing home?</strong> The average length of stay for long-term care residents is approximately 2.5 years, though this varies significantly based on the initial reason for admission and underlying health conditions.</p>
<p><strong>What is the difference between a nursing home and an assisted living facility?</strong> A nursing home (skilled nursing facility) provides 24/7 clinical nursing care and is appropriate for complex medical needs. Assisted living provides personal care assistance for those who need support with daily activities but not intensive medical supervision.</p>
`

const db = {
init() {
// Always merge DEFAULT_HUBS — fixes "Hub not found" for newly added hubs (e.g. clinical-calculators)
const savedHubs = JSON.parse(localStorage.getItem("cg_hubs") || "{}");
const mergedHubs = Object.assign({}, DEFAULT_HUBS, savedHubs);
const hubsNeedUpdate = Object.keys(DEFAULT_HUBS).some(k => !savedHubs[k]);
if (!localStorage.getItem("cg_hubs") || hubsNeedUpdate) {
localStorage.setItem("cg_hubs", JSON.stringify(mergedHubs));
}
// Always merge DEFAULT_TOOLS so new tools added to code are never missing
const saved = JSON.parse(localStorage.getItem("cg_tools") || "{}");
const merged = Object.assign({}, DEFAULT_TOOLS, saved);
// If any DEFAULT key is missing from saved (new tool added), force update
const needsUpdate = Object.keys(DEFAULT_TOOLS).some(k => !saved[k]);
if (!localStorage.getItem("cg_tools") || needsUpdate) {
localStorage.setItem("cg_tools", JSON.stringify(merged));
}
if (!localStorage.getItem("cg_guides")) {
localStorage.setItem("cg_guides", JSON.stringify(DEFAULT_GUIDES));
}
if (!localStorage.getItem("cg_states")) {
localStorage.setItem("cg_states", JSON.stringify(US_STATES_DATA));
}
},

getHubs() {
this.init();
return JSON.parse(localStorage.getItem("cg_hubs"));
},

getHub(slug) {
const hubs = this.getHubs();
return hubs[slug] || null;
},

getTools() {
this.init();
return JSON.parse(localStorage.getItem("cg_tools"));
},

getTool(slug) {
const tools = this.getTools();
return tools[slug] || null;
},

getGuides() {
this.init();
return JSON.parse(localStorage.getItem("cg_guides"));
},

getGuide(slug) {
const guides = this.getGuides();
return guides.find(g => g.slug === slug) || null;
},

getStates() {
this.init();
return JSON.parse(localStorage.getItem("cg_states"));
},

getState(slug) {
const states = this.getStates();
return states[slug.toLowerCase()] || null;
},

addTool(tool) {
this.init();
const tools = this.getTools();
tools[tool.slug] = tool;
localStorage.setItem("cg_tools", JSON.stringify(tools));
this.dispatchEvent("database_updated");
return true;
},

addGuide(guide) {
this.init();
const guides = this.getGuides();
const idx = guides.findIndex(g => g.slug === guide.slug);
if (idx !== -1) {
guides[idx] = guide;
} else {
guides.push(guide);
}
localStorage.setItem("cg_guides", JSON.stringify(guides));
this.dispatchEvent("database_updated");
return true;
},

dispatchEvent(eventName) {
const event = new CustomEvent(eventName);
window.dispatchEvent(event);
},

getRelatedLinks(currentPath) {
this.init();
const related = [];
const tools = Object.values(this.getTools());
const guides = this.getGuides();
const states = Object.values(this.getStates());

const isTool = currentPath.startsWith("/tools/");
const isHub = currentPath.startsWith("/category/");
const isGuide = currentPath.startsWith("/guides/");

let currentCategory = "";
let currentSlug = "";

if (isTool) {
currentSlug = currentPath.replace("/tools/", "");
const t = this.getTool(currentSlug);
if (t) currentCategory = t.hubSlug;
} else if (isHub) {
currentCategory = currentPath.replace("/category/", "");
} else if (isGuide) {
currentSlug = currentPath.replace("/guides/", "");
const g = this.getGuide(currentSlug);
if (g) currentCategory = g.hubSlug;
}

if (currentCategory) {
tools.forEach(t => {
if (t.slug !== currentSlug && t.hubSlug === currentCategory) {
related.push({ title: `${t.title} Tool`, url: `#/tools/${t.slug}`, type: "Tool" });
}
});

guides.forEach(g => {
if (g.slug !== currentSlug && g.hubSlug === currentCategory) {
related.push({ title: g.title, url: `#/guides/${g.slug}`, type: "Guide" });
}
});
}

const hubs = Object.values(this.getHubs());
hubs.forEach(h => {
if (h.slug !== currentCategory) {
related.push({ title: `${h.title} Hub`, url: `#/category/${h.slug}`, type: "Category Hub" });
}
});

if (currentSlug === "nursing-home-cost-calculator") {
const featuredStates = ["california", "florida", "texas", "new-york", "illinois"];
featuredStates.forEach(sName => {
const s = states.find(st => st.name.toLowerCase() === sName);
if (s) {
related.push({
title: `${s.name} Nursing Home & Care Cost Guide`,
url: `#/tools/nursing-home-cost-calculator?state=${sName}`,
type: "State Calculator"
});
}
});
}

let fillerIdx = 0;
while (related.length < 5 && fillerIdx < tools.length) {
const t = tools[fillerIdx++];
if (t.slug !== currentSlug && !related.some(r => r.url === `#/tools/${t.slug}`)) {
related.push({ title: `${t.title} Directory`, url: `#/tools/${t.slug}`, type: "Recommended Tool" });
}
}

return related.slice(0, 7);
}
};

*************************************************************************/
const ads = {
stats: {
impressions: 0,
viewed: 0,
earnings: 0.00,
rpm: 8.50
},

activeSlots: new Set(),
settings: {
enabled: true,
showCLSVisualizer: false
},

init() {
const saved = localStorage.getItem("cg_ad_settings");
if (saved) {
this.settings = JSON.parse(saved);
}
this.setupViewabilityObserver();
},

saveSettings() {
localStorage.setItem("cg_ad_settings", JSON.stringify(this.settings));
window.dispatchEvent(new CustomEvent("ad_settings_changed"));
},

setupViewabilityObserver() {
this.observer = new IntersectionObserver((entries) => {
entries.forEach(entry => {
if (entry.isIntersecting) {
const slotId = entry.target.dataset.slotId;
if (slotId && !this.activeSlots.has(slotId)) {
this.activeSlots.add(slotId);
this.triggerImpression(entry.target);
}
}
});
}, {
threshold: 0.5
});
},

triggerImpression(element) {
this.stats.impressions += 1;
setTimeout(() => {
if (document.body.contains(element)) {
this.stats.viewed += 1;
const reward = (this.stats.rpm / 1000) * (Math.random() * 0.4 + 0.8);
this.stats.earnings += parseFloat(reward.toFixed(4));

const statsEl = element.querySelector(".ad-slot-stats");
if (statsEl) {
statsEl.innerHTML = `Viewed ✓ | Earnings: $${this.stats.earnings.toFixed(3)}`;
}

window.dispatchEvent(new CustomEvent("ad_stats_updated", { detail: this.stats }));
}
}, 800);
},

render(type = "in-content", slotName = "Default Ad Slot") {
if (!this.settings.enabled) {
return `<div style="display:none;" class="ad-disabled-placeholder"></div>`;
}

const slotId = `slot_${type}_${Math.random().toString(36).substr(2, 9)}`;
let sizeClass = "";
let sizeText = "";

switch(type) {
case "sidebar":
sizeClass = "ad-sidebar";
sizeText = "Laptop: 300x600 | iPad/Mobile: 336x250";
break;
case "mobile":
sizeClass = "ad-mobile";
sizeText = "Laptop: 728x90 | iPad: 468x60 | Mobile: 320x100";
break;
case "in-content":
default:
sizeClass = "ad-in-content";
sizeText = "Laptop: 728x250 | iPad: 468x200 | Mobile: 320x150";
break;
}

const clsStyle = this.settings.showCLSVisualizer
? `border: 2px solid var(--color-danger); background-color: var(--color-danger-light);`
: "";

setTimeout(() => {
const el = document.getElementById(slotId);
if (el && this.observer) {
this.observer.observe(el);
}
}, 100);

return `
<div id="${slotId}" data-slot-id="${slotId}" class="ad-slot-container ${sizeClass} fade-in" style="${clsStyle} background:transparent; border:none;">
<!-- Ad slot: ${slotName} -->
</div>
`;
}
};

renderTasks(container) {
const listCont = container.querySelector("#planner-tasks-container");
if (!listCont) return;
listCont.innerHTML = "";
const cats = [...new Set(this.tasks.map(t => t.cat))];
const self = this;

cats.forEach(cat => {
const catTasks = this.tasks.filter(t => t.cat === cat);
if (!catTasks.length) return;

const groupDiv = document.createElement("div");
groupDiv.style.marginBottom = "0.8rem";

const catDone = catTasks.filter(t=>t.done).length;
const catHeader = document.createElement("div");
catHeader.style.cssText = `font-size:0.67rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--color-primary);padding:0.28rem 0.6rem;background:var(--color-primary-light);border-left:3px solid var(--color-primary);margin-bottom:0.3rem;display:flex;justify-content:space-between;`;
catHeader.innerHTML = `<span>${self.CAT_ICONS[cat]||'📌'} ${cat}</span><span style="color:var(--color-text-muted);font-weight:500;">${catDone}/${catTasks.length}</span>`;
groupDiv.appendChild(catHeader);

catTasks.forEach(t => {
const row = document.createElement("div");
row.style.cssText = `display:grid;grid-template-columns:auto 1fr 90px 80px 70px;gap:0.4rem;align-items:center;padding:0.4rem 0.5rem;border-bottom:1px solid var(--color-border-soft,var(--color-border-subtle));font-size:0.84rem;background:${t.done?'var(--color-primary-light)':'var(--color-bg-base)'};transition:background 0.15s;`;

row.innerHTML = `

<input type="text" class="task-time" data-task-id="${t.id}" placeholder="HH:MM" value="${t.time||''}" style="font-size:0.73rem;color:var(--color-text-muted);background:transparent;border:none;border-bottom:1px dashed var(--color-border-main);width:100%;outline:none;text-align:center;">
<input type="text" class="task-staff" data-task-id="${t.id}" placeholder="Initials" value="${t.staff||''}" style="font-size:0.73rem;background:transparent;border:none;border-bottom:1px dashed var(--color-border-main);width:100%;outline:none;text-align:center;">
<span class="task-status-btn" data-task-id="${t.id}" style="font-size:0.67rem;font-weight:700;letter-spacing:0.3px;text-align:center;padding:0.18rem 0.35rem;border-radius:3px;cursor:pointer;user-select:none;white-space:nowrap;${self.statusStyle(t.status)}">${self.statusLabel(t.status)}</span>
`;
groupDiv.appendChild(row);
});

listCont.appendChild(groupDiv);
});

this.calculateCompletion(container);

container.querySelectorAll(".task-checkbox").forEach(cb => {
cb.addEventListener("change", (e) => {
const id = parseInt(e.target.dataset.taskId);
const task = this.tasks.find(t => t.id === id);
if (task) { task.done = e.target.checked; task.status = task.done ? 'done' : 'pending'; }
this.renderTasks(container);
});
});
container.querySelectorAll(".task-time").forEach(inp => {
inp.addEventListener("change", e => {
const task = this.tasks.find(t => t.id === +e.target.dataset.taskId);
if(task) task.time = e.target.value;
});
});
container.querySelectorAll(".task-staff").forEach(inp => {
inp.addEventListener("change", e => {
const task = this.tasks.find(t => t.id === +e.target.dataset.taskId);
if(task) task.staff = e.target.value;
});
});
container.querySelectorAll(".task-status-btn").forEach(btn => {
btn.addEventListener("click", () => {
const id = +btn.dataset.taskId;
const task = this.tasks.find(t => t.id === id);
if(!task) return;
const cycle = ['pending','done','skip','urgent'];
task.status = cycle[(cycle.indexOf(task.status)+1)%cycle.length];
task.done = task.status === 'done';
this.renderTasks(container);
});
});
},

calculateCompletion(container) {
const total = this.tasks.length;
const completed = this.tasks.filter(t => t.done).length;
const pct = total > 0 ? Math.round((completed / total) * 100) : 0;
const circ = 163.4, offset = circ - (circ * pct / 100);

const ratioField = container.querySelector("#planner-completion-ratio");
const pctField   = container.querySelector("#planner-completion-pct");
const progressField = container.querySelector("#planner-progress-bar");
const ringEl     = container.querySelector("#planner-ring");

if (ratioField) ratioField.textContent = `${completed} / ${total}`;
if (pctField)   pctField.textContent   = `${pct}%`;
if (progressField) progressField.style.width = `${pct}%`;
if (ringEl) ringEl.style.strokeDashoffset = offset;
}
};

calculate(container) {
const bath = parseInt(container.querySelector("#slider-bath").value);
const dress = parseInt(container.querySelector("#slider-dress").value);
const toilet = parseInt(container.querySelector("#slider-toilet").value);
const meals = parseInt(container.querySelector("#slider-meals").value);
const clean = parseInt(container.querySelector("#slider-clean").value);
const drive = parseInt(container.querySelector("#slider-drive").value);
const rate = parseInt(container.querySelector("#slider-rate").value);

container.querySelector("#val-bath").textContent = `${bath} Hours/wk`;
container.querySelector("#val-dress").textContent = `${dress} Hours/wk`;
container.querySelector("#val-toilet").textContent = `${toilet} Hours/wk`;
container.querySelector("#val-meals").textContent = `${meals} Hours/wk`;
container.querySelector("#val-clean").textContent = `${clean} Hours/wk`;
container.querySelector("#val-drive").textContent = `${drive} Hours/wk`;
container.querySelector("#val-rate").textContent = `$${rate} / hr`;

const totalHours = bath + dress + toilet + meals + clean + drive;
const weekCost = totalHours * rate;
const monthCost = weekCost * 4.33;
const yearCost = weekCost * 52;

container.querySelector("#ch-total-hours").textContent = totalHours;
container.querySelector("#ch-cost-week").textContent = `$${weekCost.toLocaleString(undefined, {maximumFractionDigits: 0})}`;
container.querySelector("#ch-cost-month").textContent = `$${monthCost.toLocaleString(undefined, {maximumFractionDigits: 0})}`;
container.querySelector("#ch-cost-year").textContent = `$${yearCost.toLocaleString(undefined, {maximumFractionDigits: 0})}`;

const badge = container.querySelector("#ch-burnout-badge");
const tipBox = container.querySelector("#ch-burnout-tip");

if (totalHours <= 10) {
badge.textContent = "Safe Load";
badge.style.backgroundColor = "var(--color-success-light)";
badge.style.color = "var(--color-success)";

tipBox.style.color = "var(--color-success)";

badge.style.color = "var(--color-accent)";

`;

badge.textContent = "High Burnout Risk";

badge.style.color = "var(--color-danger)";

tipBox.style.backgroundColor = "var(--color-danger-light)";
tipBox.style.color = "var(--color-danger)";
tipBox.innerHTML = `
<strong>🚨 Critical Alert:</strong> Unpaid weekly shifts exceeding 20 hours are associated with high caregiver depression rates. We strongly urge you to research hourly respite assistants.
`;
}
}
};

bind(container, activeStateSlug = "") {
const stateSelector = container.querySelector("#cost-state-selector");
const monthSlider = container.querySelector("#slider-cost-months");
const hourSlider = container.querySelector("#slider-cost-hours");

if (stateSelector && monthSlider && hourSlider) {
const update = () => {
const selectedState = stateSelector.value;
this.calculate(container, selectedState);
if (selectedState && selectedState !== activeStateSlug) {
window.location.hash = `#/tools/nursing-home-cost-calculator?state=${selectedState}`;
}
};

stateSelector.addEventListener("change", update);
monthSlider.addEventListener("input", update);
hourSlider.addEventListener("input", update);
update();
}
},

calculate(container, stateSlug) {
const months = parseInt(container.querySelector("#slider-cost-months").value);
const hours = parseInt(container.querySelector("#slider-cost-hours").value);

const monthsText = months === 1
? "1 Month"
: (months % 12 === 0 ? `${months / 12} Year(s)` : `${months} Months`);
container.querySelector("#val-cost-months").textContent = `${months} Month(s) (${monthsText})`;
container.querySelector("#val-cost-hours").textContent = `${hours} Hours/wk`;

const resourceBox = container.querySelector("#cost-state-resource-box");
const stateNote = container.querySelector("#cost-state-note");

let nursingRate = 8500;
let assistedRate = 4500;
let homeHourlyRate = 28;

if (stateSlug) {
const sData = db.getState(stateSlug);
if (sData) {
nursingRate = sData.nursingHome;
assistedRate = sData.assistedLiving;
homeHourlyRate = parseFloat((sData.homeCare / 4.33 / 40).toFixed(2));

resourceBox.style.display = "block";
resourceBox.innerHTML = `
<div style="font-weight:700; color:var(--color-primary); font-size:0.85rem; margin-bottom:0.4rem;">
${sData.name} Care Resources
</div>
<div style="font-size:0.8rem; line-height:1.5; color:var(--color-text-muted);">
<div>Primary Authority: <strong>${sData.agency}</strong></div>
<div>Hotline: <a href="${sData.url}" target="_blank" style="font-weight:600; text-decoration:underline;">Visit Agency Site</a></div>
</div>
`;

stateNote.innerHTML = `
* Costs model standard medians inside <strong>${sData.name}</strong>. Home care calculates hourly aides at <strong>$${homeHourlyRate}/hr</strong>.
`;
}
} else {
resourceBox.style.display = "none";
stateNote.innerHTML = `
* Costs are modeled after U.S. National Median Averages. Select a state in the dropdown menu to calculate localized programmatic costs.
`;
}

const nursingTotal = nursingRate * months;
const assistedTotal = assistedRate * months;
const homeTotal = Math.round(hours * homeHourlyRate * 4.33 * months);

container.querySelector("#bar-nursing-value").textContent = `$${nursingTotal.toLocaleString()}`;
container.querySelector("#bar-assisted-value").textContent = `$${assistedTotal.toLocaleString()}`;
container.querySelector("#bar-home-value").textContent = `$${homeTotal.toLocaleString()}`;

const maxVal = Math.max(nursingTotal, assistedTotal, homeTotal);
const nursingPct = maxVal > 0 ? Math.round((nursingTotal / maxVal) * 100) : 0;
const assistedPct = maxVal > 0 ? Math.round((assistedTotal / maxVal) * 100) : 0;
const homePct = maxVal > 0 ? Math.round((homeTotal / maxVal) * 100) : 0;

container.querySelector("#bar-nursing-width").style.width = `${nursingPct}%`;
container.querySelector("#bar-assisted-width").style.width = `${assistedPct}%`;
container.querySelector("#bar-home-width").style.width = `${homePct}%`;
}
};

}

bind(container, params) {
const searchInput = container.querySelector("#dir-search-input");
const resultsSec = container.querySelector("#search-results-section");
const resultsGrid = container.querySelector("#search-results-grid");
const resultsHeader = container.querySelector("#search-results-header");
const hubsSec = container.querySelector("#core-hubs-section");

if (searchInput && resultsSec && resultsGrid && hubsSec && resultsHeader) {
const allTools = Object.values(db.getTools());
const allGuides = db.getGuides();

searchInput.addEventListener("input", (e) => {
const query = e.target.value.toLowerCase().trim();

if (query.length === 0) {
resultsSec.style.display = "none";
hubsSec.style.display = "block";
return;
}

const matchingTools = allTools.filter(t =>
t.title.toLowerCase().includes(query) ||
t.intro.toLowerCase().includes(query) ||
t.slug.toLowerCase().includes(query)
);

const matchingGuides = allGuides.filter(g =>
g.title.toLowerCase().includes(query) ||
g.metaDesc.toLowerCase().includes(query) ||
g.slug.toLowerCase().includes(query)
);

resultsSec.style.display = "block";
hubsSec.style.display = "none";
resultsGrid.innerHTML = "";

const totalMatches = matchingTools.length + matchingGuides.length;
resultsHeader.textContent = `${i18n.t("results_title")} (${totalMatches})`;

if (totalMatches === 0) {
resultsGrid.innerHTML = `
<div style="grid-column:1/-1; text-align:center; padding:3rem; color:var(--color-text-muted);">
<h3>${i18n.t("no_results_title")}</h3>
<p style="font-size:0.85rem; margin-top:0.4rem;">${i18n.t("no_results_desc")}</p>
</div>
`;
return;
}

matchingTools.forEach(t => {
const toolData = i18n.translateTool(t);
resultsGrid.innerHTML += `
<div class="card card-hover" style="border: 2px solid var(--color-primary-light);">
<span class="hub-tag">${i18n.t("search_tag_tool")}</span>
<h4 style="font-weight:800; font-size:1.05rem; margin:0.4rem 0;">${toolData.title}</h4>
<p style="color:var(--color-text-muted); font-size:0.8rem; line-height:1.5; margin-bottom:1rem;">${toolData.intro.slice(0, 85)}...</p>
<a href="#/tools/${toolData.slug}" class="btn btn-primary btn-sm" style="display:block; text-align:center; font-size:0.8rem; padding:0.4rem 0;">${i18n.t("launch_tool_btn")}</a>
</div>
`;
});

matchingGuides.forEach(g => {
const guideData = i18n.translateGuide(g);
resultsGrid.innerHTML += `
<div class="card card-hover" style="border: 2px solid var(--color-border-main);">
<span class="hub-tag" style="background-color:var(--color-secondary-light); color:var(--color-secondary);">${i18n.t("search_tag_guide")}</span>
<h4 style="font-weight:800; font-size:1.05rem; margin:0.4rem 0;">${guideData.title}</h4>
<p style="color:var(--color-text-muted); font-size:0.8rem; line-height:1.5; margin-bottom:1rem;">${guideData.metaDesc}</p>
<a href="#/guides/${guideData.slug}" class="btn btn-secondary btn-sm" style="display:block; text-align:center; font-size:0.8rem; padding:0.4rem 0;">${i18n.t("read_guide_btn")}</a>
</div>
`;
});
});

if (params.search) {
searchInput.value = params.search;
searchInput.dispatchEvent(new Event("input"));
}
}
}
};

bind(container, toolKey) {
const self = this;
const q = (id) => container.querySelector('#' + id);

const attachBtn = (btnId, fn) => {
const btn = q(btnId);
if (btn) btn.addEventListener('click', fn);
};

if (toolKey === 'bmi') {
attachBtn('mtb-bmi-btn', () => {
const w = +q('mtb-bmi-w').value, h = +q('mtb-bmi-h').value;
if (!w || !h) return self.toast('Please enter weight and height');
const bmi = w / Math.pow(h/100, 2);
const cat = bmi < 18.5 ? 'Underweight' : bmi < 25 ? 'Normal weight' : bmi < 30 ? 'Overweight' : 'Obese';
const cls = bmi < 18.5 ? 'mtb-low' : bmi < 25 ? 'mtb-normal' : bmi < 30 ? 'mtb-mild' : 'mtb-high';
q('mtb-bmi-val').textContent = bmi.toFixed(1);
q('mtb-bmi-note').innerHTML = `<span class="mtb-badge ${cls}">${cat}</span> — WHO Classification`;
q('mtb-bmi-res').classList.add('show');
});
} else if (toolKey === 'bsa') {
attachBtn('mtb-bsa-btn', () => {
const w = +q('mtb-bsa-w').value, h = +q('mtb-bsa-h').value;
if (!w || !h) return self.toast('Please enter weight and height');
const bsa = Math.sqrt(w * h / 3600);
q('mtb-bsa-val').textContent = bsa.toFixed(2);
q('mtb-bsa-note').textContent = `Mosteller formula — Normal range: 1.5–2.0 m²`;
q('mtb-bsa-res').classList.add('show');
});
} else if (toolKey === 'crcl') {
attachBtn('mtb-crcl-btn', () => {
const age = +q('mtb-crcl-age').value, w = +q('mtb-crcl-w').value;
const cr = +q('mtb-crcl-cr').value, sex = +q('mtb-crcl-sex').value;
if (!age || !w || !cr) return self.toast('Please fill all fields');
const crcl = (140 - age) * w * sex / (72 * cr);

content: `
<h2>What is the CDC STEADI Protocol?</h2>
<p>STEADI stands for <strong>Stopping Elderly Accidents, Deaths &amp; Injuries</strong>. It is a clinical initiative developed by the Centers for Disease Control and Prevention (CDC) to help healthcare providers and family caregivers systematically screen, assess, and intervene to prevent falls in adults aged 65 and older.</p>
<h2>The Three Core STEADI Components</h2>
<ol style="padding-left:1.2rem; display:flex; flex-direction:column; gap:0.6rem; line-height:1.7; color:var(--color-text-muted);">
<li><strong>Screen:</strong> Ask about fall history, unsteadiness, and fear of falling using validated questions.</li>
<li><strong>Assess:</strong> Evaluate gait, strength, and balance using the Timed Up &amp; Go (TUG) test and 30-Second Chair Stand test.</li>
<li><strong>Intervene:</strong> Recommend exercise programs, medication review, vitamin D supplementation, home modifications, or specialist referral.</li>
</ol>
<h2>How Carevera Uses STEADI</h2>
<p>Carevera's <a href="#/tools/fall-risk-assessment" style="color:var(--color-primary); font-weight:700;">Fall Risk Assessment Tool</a> is based on the STEADI screening questionnaire. Questions and scoring thresholds follow CDC-published guidance to categorize seniors as low, moderate, or high fall risk — and recommend next steps accordingly.</p>
<h2>Key Risk Factors Assessed</h2>
<ul style="padding-left:1.2rem; line-height:1.8; color:var(--color-text-muted);">
<li>Previous falls in the last 12 months</li>
<li>Fear of falling or avoiding activities</li>
<li>Use of assistive devices</li>
<li>Lower-body weakness or balance problems</li>
<li>Polypharmacy (4+ medications) — especially sedatives</li>
<li>Vision impairment</li>
<li>Home hazards (rugs, poor lighting, no grab bars)</li>
</ul>
<h2>References</h2>
<p style="font-size:0.85rem; color:var(--color-text-muted);">CDC STEADI Initiative: <a href="https://www.cdc.gov/steadi" target="_blank" rel="noopener" style="color:var(--color-primary);">www.cdc.gov/steadi</a></p>
`

bindEvents() {
const themeBtn = document.getElementById("theme-toggle");
if (themeBtn) {
themeBtn.addEventListener("click", () => {
const current = document.documentElement.getAttribute("data-theme");
const next = current === "dark" ? "light" : "dark";
document.documentElement.setAttribute("data-theme", next);
localStorage.setItem("cg_theme", next);
this.toggleThemeIcons();
});
}

const mobBtn = document.getElementById("mobile-menu-toggle");
const navDrawer = document.getElementById("nav-drawer");
const navOverlay = document.getElementById("nav-drawer-overlay");
const navCloseBtn = document.getElementById("nav-drawer-close");

const openDrawer = () => {
navDrawer.style.right = "0";
navOverlay.style.display = "block";
setTimeout(() => { navOverlay.style.opacity = "1"; }, 10);
document.body.style.overflow = "hidden";
};
const closeDrawer = () => {
navDrawer.style.right = "-340px";
navOverlay.style.opacity = "0";
setTimeout(() => { navOverlay.style.display = "none"; }, 320);
document.body.style.overflow = "";
};

if (mobBtn) mobBtn.addEventListener("click", openDrawer);
if (navCloseBtn) navCloseBtn.addEventListener("click", closeDrawer);
if (navOverlay) navOverlay.addEventListener("click", closeDrawer);

window.addEventListener("hashchange", () => {
closeDrawer();
this.route();
});

window.addEventListener("database_updated", () => {
this.route();
});
},

toggleThemeIcons() {
const isDark = document.documentElement.getAttribute("data-theme") === "dark";
const lightIcon = document.getElementById("theme-icon-light");
const darkIcon = document.getElementById("theme-icon-dark");

if (lightIcon && darkIcon) {
if (isDark) {
lightIcon.style.display = "none";
darkIcon.style.display = "block";
} else {
lightIcon.style.display = "block";
darkIcon.style.display = "none";
}
}
},

route() {
let hash = window.location.hash || "#/";
let path = hash.split("?")[0].replace("#", "");
if (!path.startsWith("/")) path = "/" + path;

const queryStr = hash.split("?")[1] || "";
const params = {};
if (queryStr) {
queryStr.split("&").forEach(pair => {
const parts = pair.split("=");
if (parts[0]) params[decodeURIComponent(parts[0])] = decodeURIComponent(parts[1] || "");
});
}

this.activePath = path;
this.activeParams = params;

this.renderPage(path, params);
this.updateSEOInspector(path, params);
this.highlightNavbar(path);
},

renderPage(path, params) {
const viewport = document.getElementById("app-viewport");
if (!viewport) return;

window.scrollTo(0, 0);

if (path === "/" || path === "/home") {
viewport.innerHTML = homePage.render(params);
homePage.bind(viewport, params);
} else if (path.startsWith("/tools/")) {
const toolSlug = path.replace("/tools/", "");
// Hidden tools — redirect to category hub
const hiddenTools = ["medical-unit-converter"];
if (hiddenTools.includes(toolSlug)) {
window.location.hash = "#/category/clinical-calculators";
} else {
viewport.innerHTML = toolPage.render(toolSlug, params);
toolPage.bind(viewport, toolSlug, params);
}
} else if (path.startsWith("/category/")) {
const hubSlug = path.replace("/category/", "");
viewport.innerHTML = hubPage.render(hubSlug, params);
hubPage.bind(viewport, hubSlug, params);
} else if (path.startsWith("/guides/")) {
const guideSlug = path.replace("/guides/", "");
viewport.innerHTML = articlePage.render(guideSlug, params);
articlePage.bind(viewport, guideSlug, params);
} else if (path === "/admin") {
viewport.innerHTML = adminPage.render(params);
adminPage.bind(viewport, params);
} else if (path === "/owner-notes") {
ownerNotesPage.render(viewport);
ownerNotesPage.bind(viewport);
} else if (path === "/all-tools") {
viewport.innerHTML = allToolsPage.render(params);
allToolsPage.bind(viewport, params);
} else if (path === "/about") {
viewport.innerHTML = aboutPage.render(params);
aboutPage.bind(viewport, params);
} else if (path === "/resources") {
viewport.innerHTML = resourcesPage.render(params);
resourcesPage.bind(viewport, params);
} else if (path === "/privacy-policy") {
viewport.innerHTML = privacyPage.render(params);
} else if (path === "/terms-of-service") {
viewport.innerHTML = termsPage.render(params);
} else if (path === "/contact") {
viewport.innerHTML = contactPage.render(params);
contactPage.bind(viewport, params);
} else {
viewport.innerHTML = `
<div class="card text-center fade-in" style="padding: 4rem 2rem;">
<h2 style="font-size:3rem; color:var(--color-primary);">404</h2>
<h3 style="margin-top:1rem;">${i18n.t("page_not_found")}</h3>
<p style="color:var(--color-text-muted); margin-top:0.5rem;">${i18n.t("page_not_found_desc")}</p>
<div style="margin-top:2rem;">
<a href="#/" class="btn btn-primary">${i18n.t("back_to_directory")}</a>
</div>
</div>
`;
}
},

updateSEOInspector(path, params) {
const data = seo.generate(path, params);
document.title = data.title;

const urlField = document.getElementById("seo-url-field");
const h1Field = document.getElementById("seo-h1-field");
const titleField = document.getElementById("seo-title-field");
const descField = document.getElementById("seo-desc-field");
const crumbField = document.getElementById("seo-crumb-field");
const schemaField = document.getElementById("seo-schema-field");

if (urlField) {
let fullLoc = window.location.origin + window.location.pathname + "#" + path;
if (Object.keys(params).length > 0) {
const queryStr = Object.entries(params).map(([k, v]) => `${k}=${v}`).join("&");
fullLoc += "?" + queryStr;
}
urlField.textContent = fullLoc;
}

if (h1Field) h1Field.textContent = data.h1;
if (titleField) titleField.textContent = data.title;
if (descField) descField.textContent = data.description;

if (crumbField) {
crumbField.innerHTML = data.breadcrumbs
.map(b => `<a href="${b.url}" style="font-size:0.75rem; color:var(--color-primary); font-weight:600;">${b.label}</a>`)
.join(' <span style="color:var(--color-text-light);">&gt;</span> ');
}

if (schemaField) {
schemaField.textContent = JSON.stringify(data.schema, null, 2);
}
},

highlightNavbar(path) {
document.querySelectorAll(".nav-links .nav-item").forEach(el => el.classList.remove("active"));
if (path === "/" || path === "/home") {
document.getElementById("nav-home")?.classList.add("active");
} else if (path.startsWith("/category/medication-management")) {
document.getElementById("nav-meds")?.classList.add("active");
} else if (path.startsWith("/category/elder-care-costs")) {
document.getElementById("nav-costs")?.classList.add("active");
} else if (path === "/about") {
document.getElementById("nav-about")?.classList.add("active");
} else if (path === "/resources") {
document.getElementById("nav-resources")?.classList.add("active");
} else if (path === "/admin") {
document.getElementById("nav-admin")?.classList.add("active");
}
}
};

<script>
/* ── Toast Notification System ── */
window.showToast = function(message, type = 'success', duration = 3500) {
const container = document.getElementById('toast-container');
if (!container) return;
const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
const toast = document.createElement('div');
toast.className = `toast toast-${type}`;
toast.innerHTML = `<span style="font-size:1rem;">${icons[type] || icons.success}</span><span>${message}</span>`;
container.appendChild(toast);
setTimeout(() => {
toast.classList.add('toast-out');
setTimeout(() => toast.remove(), 320);
}, duration);
};

/* Intercept alert() globally to use toast instead — only for simple string messages */
const _nativeAlert = window.alert.bind(window);
window.alert = function(msg) {
if (typeof msg === 'string' && msg.length < 500) {
const lc = msg.toLowerCase();
const type = (lc.includes('error') || lc.includes('please fill') || lc.includes('valid email') || lc.includes('invalid'))
? 'error'
: (lc.includes('success') || lc.includes('published') || lc.includes('saved') || lc.includes('added') || lc.includes('enabled') || lc.includes('disabled'))
? 'success'
: 'info';
showToast(msg, type, 4500);
} else {
_nativeAlert(msg);
}
};

/* ── Scroll Progress Bar ── */
const progressBar = document.getElementById('scroll-progress-bar');
const backToTopBtn = document.getElementById('back-to-top');
function updateScrollUI() {
const scrollTop = window.scrollY;
const docHeight = document.documentElement.scrollHeight - window.innerHeight;
if (progressBar && docHeight > 0) {
progressBar.style.width = Math.min(100, (scrollTop / docHeight) * 100) + '%';
}
if (backToTopBtn) {
if (scrollTop > 400) backToTopBtn.classList.add('visible');
else backToTopBtn.classList.remove('visible');
}
}
window.addEventListener('scroll', updateScrollUI, { passive: true });

/* ── Back to Top ── */
if (backToTopBtn) {
backToTopBtn.addEventListener('click', () => {
window.scrollTo({ top: 0, behavior: 'smooth' });
});
}

/* ── Social Share FAB ── */
const shareFabBtn = document.getElementById('share-fab-btn');
const shareOptions = document.getElementById('share-options');
if (shareFabBtn && shareOptions) {
shareFabBtn.addEventListener('click', (e) => {
e.stopPropagation();
shareOptions.classList.toggle('open');
});
document.addEventListener('click', (e) => {
if (!e.target.closest('#share-fab')) shareOptions.classList.remove('open');
});
}

window.shareVia = function(platform) {
const url = encodeURIComponent('https://careverahealth.fit/#/');
const text = encodeURIComponent('Free senior caregiver tools — fall risk assessments, medication schedulers, cost calculators and more. All free, all private.');
shareOptions && shareOptions.classList.remove('open');
switch(platform) {
case 'copy':
navigator.clipboard.writeText('https://careverahealth.fit/#/').then(() => {
showToast('Link copied to clipboard!', 'success');
}).catch(() => {
showToast('Copy failed. URL: careverahealth.fit', 'info');
});
break;
case 'whatsapp':
window.open(`https://wa.me/?text=${text}%20${url}`, '_blank', 'noopener');
break;
case 'facebook':
window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, '_blank', 'noopener,width=580,height=400');
break;
case 'twitter':
window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank', 'noopener,width=580,height=400');
break;
case 'email':
window.location.href = `mailto:?subject=Free%20Senior%20Caregiver%20Tools%20%E2%80%94%20Carevera&body=${text}%0A%0A${url}`;

}
};

/* ── Scroll Reveal Animations ── */
const revealObserver = new IntersectionObserver((entries) => {
entries.forEach((entry) => {
if (entry.isIntersecting) {
entry.target.classList.add('revealed');
revealObserver.unobserve(entry.target);
}
});
}, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

function applyRevealToCards() {
setTimeout(() => {
document.querySelectorAll('.card:not(.no-reveal), .testimonial-card').forEach((el, i) => {
if (!el.classList.contains('reveal') && !el.classList.contains('revealed')) {
el.classList.add('reveal');
el.style.transitionDelay = Math.min(i * 0.05, 0.35) + 's';
revealObserver.observe(el);
}
});
}, 200);
}

/* ── Page Transition Enhancement — subtle fade after app renders new content ── */
window.addEventListener('hashchange', () => {
const viewport = document.getElementById('app-viewport');
if (viewport) {
/* Small delay so app renders first, then we reveal */
setTimeout(() => {
viewport.style.opacity = '0';
viewport.style.transform = 'translateY(6px)';
requestAnimationFrame(() => {
viewport.style.transition = 'opacity 0.25s ease, transform 0.25s ease';
viewport.style.opacity = '1';
viewport.style.transform = 'translateY(0)';
});
applyRevealToCards();
}, 80);
}
});

/* ── Keyboard Shortcut: / focuses search ── */
document.addEventListener('keydown', (e) => {
if (e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
e.preventDefault();
const searchEl = document.querySelector('.search-input');
if (searchEl) {
searchEl.focus();
searchEl.select();
}
}
});

/* ── Newsletter Signup ── */
window.handleNewsletterSignup = function(e) {
if (e) e.preventDefault();
const input = document.getElementById('newsletter-email-input');
if (!input) return;
const email = input.value.trim();
if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
showToast('Please enter a valid email address.', 'error');
return;
}
input.value = '';
showToast('🎉 You\'re on the list! We\'ll notify you of new caregiver tools.', 'success', 5000);
};
