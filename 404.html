<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Carevera Health Tools</title>
<script>
  // GitHub Pages SPA redirect — converts clean URLs back to hash routing
  var path = window.location.pathname.replace('/careverahealth', '');
  var search = window.location.search;
  var hash = path === '/' ? '' : path;
  window.location.replace(
    window.location.origin + '/careverahealth/#' + hash + search
  );
</script>
</head>
<body></body>
</html>
